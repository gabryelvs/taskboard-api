spring:
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/taskboard}
    username: ${DATABASE_USER:taskboard}
    password: ${DATABASE_PASSWORD:taskboard}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true

app:
  jwt:
    secret: ${JWT_SECRET:dev-secret-change-me-must-be-at-least-256-bits-long-for-hs256}
    access-ttl-minutes: 15
    refresh-ttl-days: 7

management:
  endpoints:
    web:
      exposure:
        include: health
